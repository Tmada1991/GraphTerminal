<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>Dify Tree UI</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 20px;
        }

        ul {
            list-style-type: none;
            padding-left: 20px;
            border-left: 1px dashed #ccc;
            margin-left: 10px;
        }

        li {
            margin: 8px 0;
        }

        .node {
            cursor: pointer;
            color: #0066cc;
            text-decoration: underline;
            padding: 2px 4px;
        }

        .node:hover {
            background-color: #f0f8ff;
        }

        .node.expanded {
            color: #333;
            text-decoration: none;
            cursor: default;
        }

        .loading {
            color: #888;
            font-size: 0.9em;
            font-style: italic;
        }

        .error {
            color: #cc0000;
            font-size: 0.9em;
        }
    </style>
</head>

<body>
    <h2>ツリーUIの自作（Dify API連携）</h2>
    <div>
        <input type="text" id="topic-input" placeholder="トピックを入力 (例: AIの歴史)" value="AIの歴史"
            style="width: 250px; padding: 5px;">
        <button id="start-btn" style="padding: 5px 15px;">抽出開始</button>
    </div>

    <div id="tree-container" style="margin-top: 20px;">
        <ul id="tree-root"></ul>
    </div>

    <script>
        // 【重要】あなたのDify APIキーに置き換えてください
        const API_KEY = 'app-YLo9H8Aqdrc1NRs9tqRBYFzl';
        const API_URL = 'https://api.dify.ai/v1/chat-messages';

        let conversationId = "";
        let currentTargetTopic = "";

        document.getElementById('start-btn').addEventListener('click', () => {
            const topic = document.getElementById('topic-input').value.trim();
            if (!topic) return;

            // 初期化
            conversationId = "";
            currentTargetTopic = topic;
            const rootUl = document.getElementById('tree-root');
            rootUl.innerHTML = '';

            // 初回API呼び出し
            fetchNode(topic, rootUl);
        });

        async function fetchNode(query, parentElement) {
            // ローディング表示
            const loadingLi = document.createElement('li');
            loadingLi.className = 'loading';
            loadingLi.textContent = '思考中...';
            parentElement.appendChild(loadingLi);

            // リクエストデータ
            const data = {
                "inputs": {
                    "target_topic": currentTargetTopic
                },
                "query": query,
                "response_mode": "blocking",
                "conversation_id": conversationId,
                "user": "test_user_01"
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                if (!response.ok) {
                    throw new Error(`APIリクエスト失敗: ${response.status}`);
                }

                const result = await response.json();

                // 初回通信時にconversation_idを保存し、以降の通信で引き継ぐ
                if (!conversationId && result.conversation_id) {
                    conversationId = result.conversation_id;
                }

                // LLMの出力結果（JSON文字列）をJavaScriptのオブジェクトにパース
                const answerJson = JSON.parse(result.answer);

                // ローディング表示を削除
                parentElement.removeChild(loadingLi);

                // 子ノードを描画
                if (answerJson.children && answerJson.children.length > 0) {
                    const ul = document.createElement('ul');
                    answerJson.children.forEach(child => {
                        const li = document.createElement('li');
                        const span = document.createElement('span');
                        span.className = 'node';
                        span.textContent = child.label;

                        // クリック時の深掘りイベント（1回のみ発火するように制御）
                        span.addEventListener('click', function onClick() {
                            span.removeEventListener('click', onClick);
                            span.classList.add('expanded'); // クリック済みスタイルに変更
                            fetchNode(child.label, li); // 子ノードの配下にさらにツリーを展開
                        });

                        li.appendChild(span);
                        ul.appendChild(li);
                    });
                    parentElement.appendChild(ul);
                }

            } catch (error) {
                parentElement.removeChild(loadingLi);
                const errorLi = document.createElement('li');
                errorLi.className = 'error';
                errorLi.textContent = 'エラー: ' + error.message;
                parentElement.appendChild(errorLi);
            }
        }
    </script>
</body>

</html>
